<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1300 780" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#334155"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 z" fill="#b91c1c"/>
    </marker>
    <style>
      .title { font-size: 26px; font-weight: 700; fill: #0f172a; }
      .subtitle { font-size: 14px; fill: #475569; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 10; }
      .boxlabel { font-size: 15px; font-weight: 600; fill: #0f172a; }
      .boxsub { font-size: 12px; fill: #64748b; }
      .gen { fill: #eff6ff; stroke: #3b82f6; stroke-width: 1.5; }
      .gate { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; }
      .gov { fill: #f0fdf4; stroke: #16a34a; stroke-width: 1.5; }
      .layerlabel { font-size: 12px; font-weight: 700; letter-spacing: 1px; }
      .cloud { fill: #fff7ed; stroke: #f59e0b; stroke-width: 1.5; }
      .cloudchip { fill: #ffffff; stroke: #fbbf24; stroke-width: 1; }
      .chiplive { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; }
      .chip { font-size: 12px; fill: #7c2d12; font-weight: 600; }
      .chipgreen { font-size: 12px; fill: #14532d; font-weight: 700; }
      .metric { font-size: 13px; fill: #14532d; font-weight: 600; }
      .check { font-size: 11.5px; fill: #7f1d1d; }
    </style>
  </defs>

  <rect x="0" y="0" width="1300" height="780" fill="#ffffff"/>

  <!-- Header -->
  <text x="40" y="46" class="title">LedgerPilot</text>
  <text x="40" y="70" class="subtitle">Autonomous month-end-close agent on Qwen Cloud  ·  Track 4: Autopilot Agent  ·  the ledger is a system of record the LLM may never write to directly</text>

  <!-- Layer band labels -->
  <text x="40" y="110" class="layerlabel" fill="#2563eb">GENERATIVE (Qwen)</text>
  <text x="600" y="110" class="layerlabel" fill="#dc2626">DETERMINISTIC TRUST BOUNDARY</text>
  <text x="1040" y="110" class="layerlabel" fill="#16a34a">GOVERNED WRITE-BACK</text>

  <!-- Inputs -->
  <rect x="40" y="130" width="150" height="120" class="box" rx="10"/>
  <text x="115" y="160" text-anchor="middle" class="boxlabel">Unstructured</text>
  <text x="115" y="180" text-anchor="middle" class="boxlabel">inputs</text>
  <text x="115" y="205" text-anchor="middle" class="boxsub">invoices,</text>
  <text x="115" y="222" text-anchor="middle" class="boxsub">bank statements,</text>
  <text x="115" y="239" text-anchor="middle" class="boxsub">receipts</text>

  <!-- Ingestion -->
  <rect x="215" y="130" width="160" height="120" class="gen" rx="10"/>
  <text x="295" y="162" text-anchor="middle" class="boxlabel">Ingestion</text>
  <text x="295" y="188" text-anchor="middle" class="boxsub">qwen3-vl-plus</text>
  <text x="295" y="210" text-anchor="middle" class="boxsub">extract line items,</text>
  <text x="295" y="227" text-anchor="middle" class="boxsub">amounts, parties</text>

  <!-- Planner -->
  <rect x="400" y="130" width="170" height="120" class="gen" rx="10"/>
  <text x="485" y="162" text-anchor="middle" class="boxlabel">Planner</text>
  <text x="485" y="188" text-anchor="middle" class="boxsub">qwen3.7-max +</text>
  <text x="485" y="205" text-anchor="middle" class="boxsub">function calling</text>
  <text x="485" y="227" text-anchor="middle" class="boxsub">proposes entry (never writes)</text>

  <!-- GATE -->
  <rect x="600" y="120" width="320" height="300" class="gate" rx="12"/>
  <text x="760" y="150" text-anchor="middle" class="boxlabel" fill="#991b1b" font-size="17">DETERMINISTIC GATE</text>
  <text x="760" y="170" text-anchor="middle" class="boxsub" fill="#b91c1c">8 pure rules · no LLM · reproducible</text>
  <line x1="620" y1="182" x2="900" y2="182" stroke="#fca5a5" stroke-width="1"/>
  <text x="622" y="203" class="check">1  Balance: debits = credits, to the cent</text>
  <text x="622" y="223" class="check">2  Account validity: exists and is postable</text>
  <text x="622" y="243" class="check">3  No self-contra: same account both sides</text>
  <text x="622" y="263" class="check">4  Positive amounts</text>
  <text x="622" y="283" class="check">5  Period lock: entry date in an open period</text>
  <text x="622" y="303" class="check">6  Segregation of duties: preparer != approver</text>
  <text x="622" y="323" class="check">7  Approval threshold: HITL above limit</text>
  <text x="622" y="343" class="check" font-weight="700">8  Reconcile to source: right amount + account</text>
  <text x="622" y="362" class="check" fill="#991b1b">    (catches balanced-but-wrong entries an LLM makes)</text>
  <rect x="620" y="374" width="280" height="36" fill="#fee2e2" stroke="#fca5a5" rx="6"/>
  <text x="760" y="397" text-anchor="middle" class="check" font-weight="700">APPROVED  ·  NEEDS_HUMAN  ·  REJECTED</text>

  <!-- Signed token -->
  <rect x="950" y="130" width="150" height="90" class="gov" rx="10"/>
  <text x="1025" y="162" text-anchor="middle" class="boxlabel">Signed token</text>
  <text x="1025" y="185" text-anchor="middle" class="boxsub">HMAC bound to</text>
  <text x="1025" y="202" text-anchor="middle" class="boxsub">entry content hash</text>

  <!-- Write-back -->
  <rect x="950" y="245" width="150" height="120" class="gov" rx="10"/>
  <text x="1025" y="274" text-anchor="middle" class="boxlabel">Write-back</text>
  <text x="1025" y="296" text-anchor="middle" class="boxsub">re-checks gate,</text>
  <text x="1025" y="313" text-anchor="middle" class="boxsub">verifies token,</text>
  <text x="1025" y="330" text-anchor="middle" class="boxsub">idempotent on retry</text>
  <text x="1025" y="352" text-anchor="middle" class="boxsub" font-weight="700">XML-RPC or MCP</text>

  <!-- Odoo -->
  <rect x="1130" y="245" width="130" height="120" class="box" rx="10"/>
  <text x="1195" y="292" text-anchor="middle" class="boxlabel">Odoo ERP</text>
  <text x="1195" y="314" text-anchor="middle" class="boxsub">account.move</text>
  <text x="1195" y="331" text-anchor="middle" class="boxsub">system of record</text>
  <text x="1195" y="352" text-anchor="middle" class="boxsub">live Odoo 19</text>

  <!-- Reject path -->
  <rect x="600" y="450" width="320" height="60" class="box" rx="10" stroke="#b91c1c"/>
  <text x="760" y="476" text-anchor="middle" class="boxlabel" fill="#991b1b">Rejected / escalated</text>
  <text x="760" y="496" text-anchor="middle" class="boxsub">refused, with the failing check as the reason</text>

  <!-- Arrows: main flow -->
  <line x1="190" y1="190" x2="213" y2="190" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="375" y1="190" x2="398" y2="190" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="190" x2="598" y2="190" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="920" y1="175" x2="948" y2="175" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1025" y1="220" x2="1025" y2="243" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1100" y1="305" x2="1128" y2="305" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- reject arrow -->
  <line x1="760" y1="420" x2="760" y2="448" stroke="#b91c1c" stroke-width="2" marker-end="url(#arrowRed)"/>

  <!-- Metric callout -->
  <rect x="40" y="290" width="530" height="130" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5" rx="10"/>
  <text x="60" y="318" class="boxlabel" fill="#14532d">Offline synthetic gate stress-test (204 cases, 12 scenarios x 14 error classes)</text>
  <text x="60" y="346" class="metric">False-write rate:  0 wrong of 36 approved  ·  &lt;= 8.33% at 95% CI</text>
  <text x="60" y="370" class="metric">Catch rate:  100%  (168 / 168 = 156 blocked + 12 escalated to human)</text>
  <text x="60" y="394" class="metric">False-reject rate:  0%  (0 / 36 clean controls wrongly blocked)</text>
  <text x="60" y="412" class="boxsub">reproduce: python -m eval.harness   (offline, no key)  ·  --live uses the real Qwen planner</text>

  <!-- Counterfactual callout -->
  <rect x="40" y="432" width="530" height="118" fill="#f0fdf4" stroke="#16a34a" stroke-width="2" rx="10"/>
  <text x="60" y="457" class="boxlabel" fill="#14532d">Counterfactual: same model, same 39 tasks, same live ledger</text>
  <text x="60" y="481" class="metric" fill="#991b1b">Gate OFF  ·  39 posted  ·  5 WRONG entries now in the ledger</text>
  <text x="60" y="503" class="metric" fill="#14532d">Gate ON   ·  34 posted  ·  0 wrong entries</text>
  <text x="60" y="527" class="boxlabel" fill="#14532d" font-size="14">The wrong writes become 0. The model did not get better; the ledger did.</text>
  <text x="60" y="544" class="boxsub">measured live (39 tasks, on ECS): 8 model mistakes across 2 models, 8 caught, 0 wrong writes</text>

  <!-- Cloud band -->
  <rect x="40" y="560" width="1220" height="180" class="cloud" rx="12"/>
  <text x="60" y="590" class="layerlabel" fill="#b45309">ALIBABA CLOUD  ·  the backend RUNS HERE (green = live and proven, grey = designed, not yet wired)</text>

  <g>
    <rect x="60" y="602" width="285" height="54" class="chiplive" rx="8"/>
    <text x="202" y="624" text-anchor="middle" class="chipgreen">ECS  ·  agent runtime + MCP server</text>
    <text x="202" y="644" text-anchor="middle" class="boxsub">i-t4n1i5p7bz4ypj122e6q · ap-southeast-1</text>

    <rect x="355" y="602" width="285" height="54" class="chiplive" rx="8"/>
    <text x="497" y="624" text-anchor="middle" class="chipgreen">Model Studio / DashScope</text>
    <text x="497" y="644" text-anchor="middle" class="boxsub">qwen3.7-max · function calling · MCP</text>

    <rect x="650" y="602" width="285" height="54" class="chiplive" rx="8"/>
    <text x="792" y="624" text-anchor="middle" class="chipgreen">ECS + VPC OpenAPI</text>
    <text x="792" y="644" text-anchor="middle" class="boxsub">scripts/deploy_ecs.py provisioned the box</text>

    <rect x="945" y="602" width="285" height="54" class="chiplive" rx="8"/>
    <text x="1087" y="624" text-anchor="middle" class="chipgreen">Live Odoo 19  ·  system of record</text>
    <text x="1087" y="644" text-anchor="middle" class="boxsub">3 real posted account.move (1 via MCP)</text>

    <rect x="60" y="666" width="560" height="40" fill="#f8fafc" stroke="#e2e8f0" rx="8"/>
    <text x="72" y="691" class="boxsub">Planned: OSS (document store) · Tablestore (tokens, audit log) · AnalyticDB (policy retrieval) · API Gateway</text>

    <rect x="640" y="666" width="590" height="40" fill="#fffbeb" stroke="#fde68a" rx="8"/>
    <text x="652" y="684" class="boxsub" fill="#78350f" font-weight="700">Proof of Alibaba Cloud Deployment (2 services, 2 code files):</text>
    <text x="652" y="700" class="boxsub" fill="#78350f">ledgerpilot/planner.py (Qwen on Model Studio) · scripts/deploy_ecs.py (ECS + VPC OpenAPI)</text>

    <text x="60" y="729" class="boxsub" fill="#78350f">Transcript generated on the instance: docs/ecs_proof.txt  ·  gate web UI served from the ECS public IP on port 80</text>
  </g>
</svg>
